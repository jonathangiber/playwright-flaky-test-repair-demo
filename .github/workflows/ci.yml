name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  prove-before:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run ci:prove-before
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: before-proof
          path: artifacts/before-ci-summary.txt

  prove-after:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run ci:prove-after
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: after-proof
          path: artifacts/after-ci-summary.txt
